name: CI

on:
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (backend)
        run: pnpm --filter backend db:generate

      - name: Lint frontend
        run: pnpm --filter frontend lint

      - name: Lint backend
        run: pnpm --filter backend lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm --filter frontend typecheck

      - name: Generate Prisma client (backend)
        run: pnpm --filter backend db:generate

      - name: Typecheck backend
        run: pnpm --filter backend typecheck

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter frontend build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend db:generate

      - name: Build
        run: pnpm --filter backend build

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend db:generate

      - name: Run unit tests
        run: pnpm --filter backend test:unit

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fleetmanager
          POSTGRES_PASSWORD: fleetmanager_dev
          POSTGRES_DB: fleetmanager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend db:generate

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://fleetmanager:fleetmanager_dev@localhost:5432/fleetmanager_test
          DATABASE_URL_TEST: postgresql://fleetmanager:fleetmanager_dev@localhost:5432/fleetmanager_test
          INTEGRATION_TEST: '1'
          JWT_SECRET: test-jwt-secret-min-64-chars-000000000000000000000000000000000000
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-min-64-chars-00000000000000000000000000
          NODE_ENV: test
        run: pnpm --filter backend test:integration
