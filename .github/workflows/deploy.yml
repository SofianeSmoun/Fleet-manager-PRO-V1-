name: Deploy

on:
  push:
    branches:
      - develop
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Ne jamais annuler un deploy en cours

jobs:
  # ─── Build & validate ─────────────────────────────────────────────────────
  build:
    name: Build & validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --recursive lint

      - name: Typecheck
        run: pnpm --recursive typecheck

      - name: Build frontend
        run: pnpm --filter frontend build

      - name: Build backend
        run: pnpm --filter backend build

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

      - name: Upload backend dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: backend/dist/
          retention-days: 7

  # ─── Deploy to Staging (develop branch) ───────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && secrets.STAGING_HOST != ''
    environment:
      name: staging
      url: https://staging.fleetmanager.dz
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/fleetmanager

            echo "→ Pull latest code"
            git pull origin develop

            echo "→ Install dependencies"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            pnpm install --frozen-lockfile

            echo "→ Run migrations"
            pnpm --filter backend exec prisma migrate deploy

            echo "→ Build"
            pnpm --filter frontend build
            pnpm --filter backend build

            echo "→ Restart services"
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build backend nginx

            echo "✅ Staging deployment complete"

  # ─── Deploy to Production (main branch) ───────────────────────────────────
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && secrets.PROD_HOST != ''
    environment:
      name: production
      url: https://fleetmanager.dz
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/fleetmanager

            echo "→ Pull latest code"
            git pull origin main

            echo "→ Install dependencies"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            pnpm install --frozen-lockfile --prod=false

            echo "→ Run migrations"
            pnpm --filter backend exec prisma migrate deploy

            echo "→ Build"
            pnpm --filter frontend build
            pnpm --filter backend build

            echo "→ Restart services"
            docker compose up -d --build backend nginx

            echo "✅ Production deployment complete"

  # ─── Auto-tag version (main branch only) ──────────────────────────────────
  tag-version:
    name: Tag version
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.ref == 'refs/heads/main' && secrets.PROD_HOST != ''
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create version tag
        env:
          VERSION: ${{ needs.build.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${VERSION}"
          echo "Creating tag ${TAG}"

          # Éviter les doublons
          if git ls-remote --tags origin "${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG} — $(date +'%Y-%m-%d')"
          git push origin "${TAG}"
          echo "✅ Tag ${TAG} created and pushed"
