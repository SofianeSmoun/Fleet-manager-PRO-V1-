version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetmanager_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleetmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleetmanager_dev}
      POSTGRES_DB: ${POSTGRES_DB:-fleetmanager}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fleetmanager} -d ${POSTGRES_DB:-fleetmanager}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fleetmanager_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fleetmanager}:${POSTGRES_PASSWORD:-fleetmanager_dev}@postgres:5432/${POSTGRES_DB:-fleetmanager}
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      TZ: Africa/Algiers
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - '3000:3000'

  nginx:
    image: nginx:alpine
    container_name: fleetmanager_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro

volumes:
  postgres_data:
    name: fleetmanager_postgres_data
